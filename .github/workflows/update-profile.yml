name: Update Profile Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate profile dashboard
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: jeongiryang
        run: npm run check

      - name: Commit generated changes
        run: |
          if [[ -n "$(git status --porcelain README.md assets/generated)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md assets/generated/project-cards.svg
            git commit -m "chore: update profile dashboard"
            git push
          else
            echo "No profile dashboard changes to commit."
          fi
